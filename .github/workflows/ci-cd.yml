name: Optimized CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Grant permissions to write package images to GHCR
permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Linting & Unit Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Lint checks
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Mocked Unit Tests
        env:
          # Mock test runs fully offline, but environment is set for config safety
          GEMINI_API_KEY: "mock_api_key_for_testing"
          PYTHONPATH: .
        run: |
          pytest scratch/test_context_caching.py

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image (Verify Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          # Cache config to store layers on GitHub Actions cache backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build-check]
    # Execute only on merges/pushes to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Production Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Downcase repository name to ensure valid Docker tag naming conventions
          tags: |
            ghcr.io/${{ github.repository_owner }}/cv-evaluator-backend:latest
            ghcr.io/${{ github.repository_owner }}/cv-evaluator-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH Deploy to Target Server (No Downtime)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Log in to GHCR on the remote production server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest built production images
            docker pull ghcr.io/${{ github.repository_owner }}/cv-evaluator-backend:latest
            
            # Restart services with minimal interruption using docker compose
            cd /app/devops-system
            docker compose up -d --no-deps --build backend worker flower
            
            # Cleanup unused dangling images to free disk space
            docker image prune -f
