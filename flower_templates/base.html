{% import pprint %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flower</title>
  	<link rel="stylesheet" href="{{ static_url('css/bootstrap.min.css') }}">
	  <link rel="stylesheet" href="{{ static_url('css/datatables-1.13.4.min.css') }}">
	  <link href="{{ static_url('css/flower.css') }}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0b0f19;
        color: #e2e8f0;
      }
      /* Custom Navbar with Glassmorphism */
      .navbar {
        background: rgba(15, 23, 42, 0.8) !important;
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 0.75rem 1.5rem !important;
        margin: 1rem 0.5rem !important;
      }
      .navbar-brand {
        font-weight: 700;
        color: #38bdf8 !important;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .nav-link {
        color: #94a3b8 !important;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      .nav-link:hover, .nav-item.active .nav-link {
        color: #38bdf8 !important;
      }
      
      /* Table Customization */
      .table-responsive {
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      table.table {
        background-color: #111827 !important;
        margin-bottom: 0 !important;
        color: #e2e8f0 !important;
      }
      table.table th {
        background-color: #1f2937 !important;
        color: #38bdf8 !important;
        font-weight: 600;
        border-color: rgba(255, 255, 255, 0.05) !important;
        padding: 12px 16px !important;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
      }
      table.table td {
        background-color: #111827 !important;
        border-color: rgba(255, 255, 255, 0.03) !important;
        color: #94a3b8 !important;
        padding: 12px 16px !important;
        font-size: 0.9rem;
      }
      table.table-striped tbody tr:nth-of-type(odd) td {
        background-color: #161e2e !important;
      }
      table.table-hover tbody tr:hover td {
        background-color: #1f2937 !important;
        color: #e2e8f0 !important;
      }

      /* Badges & Status */
      .badge {
        padding: 0.35em 0.65em !important;
        font-weight: 600 !important;
        border-radius: 6px !important;
        display: inline-block;
      }
      .badge-success, .bg-success, .badge-online, span.bg-green, .badge.bg-success, td:has(> .bg-success) {
        background-color: rgba(34, 197, 94, 0.15) !important;
        color: #4ade80 !important;
        border: 1px solid rgba(34, 197, 94, 0.3) !important;
      }
      .badge-danger, .bg-danger, .badge-offline, .badge.bg-danger, td:has(> .bg-danger) {
        background-color: rgba(239, 68, 68, 0.15) !important;
        color: #f87171 !important;
        border: 1px solid rgba(239, 68, 68, 0.3) !important;
      }
      .badge-warning, .bg-warning, .badge-retry, .badge.bg-warning, td:has(> .bg-warning) {
        background-color: rgba(245, 158, 11, 0.15) !important;
        color: #fbbf24 !important;
        border: 1px solid rgba(245, 158, 11, 0.3) !important;
      }
      .badge-info, .bg-info, .badge.bg-info, td:has(> .bg-info) {
        background-color: rgba(56, 189, 248, 0.15) !important;
        color: #38bdf8 !important;
        border: 1px solid rgba(56, 189, 248, 0.3) !important;
      }
      
      /* Tabs styling */
      .nav-tabs {
        border-bottom: 2px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 1.5rem;
      }
      .nav-tabs .nav-link {
        background: transparent !important;
        border: none !important;
        padding: 10px 20px;
        color: #64748b !important;
        position: relative;
        font-weight: 600;
      }
      .nav-tabs .nav-link.active {
        color: #38bdf8 !important;
      }
      .nav-tabs .nav-link.active::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #38bdf8;
      }

      /* Form inputs & Buttons */
      input[type="number"], input[type="text"], select {
        background-color: #1f2937 !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #e2e8f0 !important;
        border-radius: 8px !important;
        padding: 6px 12px !important;
      }
      input[type="number"]:focus, input[type="text"]:focus {
        border-color: #38bdf8 !important;
        outline: none !important;
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2) !important;
      }
      .btn-primary {
        background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%) !important;
        border: none !important;
        border-radius: 8px !important;
        font-weight: 600 !important;
        padding: 6px 16px !important;
        transition: transform 0.1s ease, box-shadow 0.2s ease !important;
      }
      .btn-primary:hover {
        box-shadow: 0 0 12px rgba(56, 189, 248, 0.3) !important;
        transform: translateY(-1px);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      
      /* Card-like headings & panels */
      h3#workername {
        color: #38bdf8;
        font-weight: 700;
      }
      legend, caption {
        color: #38bdf8 !important;
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 0.75rem;
      }
      
      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0b0f19;
      }
      ::-webkit-scrollbar-thumb {
        background: #1f2937;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #374151;
      }
    </style>
  </head>
  <body class="m-2">
    {% block navbar %}
      {% module Template("navbar.html", active_tab="") %}
    {% end %}

    <div class="container-fluid my-2">
      <div id="alert-container"></div>
      <input type="hidden" value="{{ url_prefix or '' }}" id='url_prefix'>
    </div>

    {% block container %}
    {% end %}

    <script src="{{ static_url('js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ static_url('js/jquery-3.6.4.min.js') }}"></script>
    <script src="{{ static_url('js/datatables-1.13.4.min.js') }}"></script>
    <script src="{{ static_url('js/moment-2.29.4.min.js') }}"></script>
    <script src="{{ static_url('js/moment-timezone-with-data-2.29.4.min.js') }}"></script>
	  <script src="{{ static_url('js/flower.js') }}"></script>

    {% block extra_scripts %}
    {% end %}
  </body>
</html>
