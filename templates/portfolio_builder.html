<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAThong AI — Portfolio Builder</title>
    <meta name="description" content="Trợ lý AI hướng dẫn bạn xây dựng hồ sơ Portfolio chuyên nghiệp qua từng bước hội thoại.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans:   ['Inter',  'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        darkBg:      '#090d16',
                        darkCard:    '#111827',
                        violet:      '#8b5cf6',
                        fuchsia:     '#d946ef',
                        skyAccent:   '#38bdf8',
                        greenAccent: '#4ade80',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #090d16;
            background-image:
                radial-gradient(at 5%   5%,  rgba(139,92,246,0.10) 0px, transparent 55%),
                radial-gradient(at 95%  90%, rgba(217,70,239,0.07) 0px, transparent 55%),
                radial-gradient(at 50%  50%, rgba(56,189,248,0.04) 0px, transparent 65%);
            background-attachment: fixed;
        }
        .glass {
            background: rgba(17,24,39,0.72);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* ── Bubbles ── */
        .bubble-bot {
            align-self: flex-start;
            background: rgba(30,41,59,.90);
            border: 1px solid rgba(139,92,246,.18);
            color: #cbd5e1;
            border-bottom-left-radius: 4px;
        }
        .bubble-user {
            align-self: flex-end;
            background: linear-gradient(135deg,#8b5cf6 0%,#d946ef 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .bubble-edit {
            align-self: flex-start;
            background: rgba(245,158,11,.10);
            border: 1px solid rgba(245,158,11,.3);
            color: #fcd34d;
            border-bottom-left-radius: 4px;
        }
        .bubble-bot, .bubble-user, .bubble-edit {
            max-width: 85%;
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            animation: bubblePop .22s cubic-bezier(.34,1.5,.64,1) both;
        }
        @keyframes bubblePop {
            from { transform: scale(.88) translateY(8px); opacity: 0; }
            to   { transform: scale(1)   translateY(0);   opacity: 1; }
        }

        /* ── Typing ── */
        .typing-dot {
            width:7px;height:7px;background:#8b5cf6;border-radius:50%;
            animation:typingBounce 1.2s infinite;
        }
        .typing-dot:nth-child(2){animation-delay:.2s}
        .typing-dot:nth-child(3){animation-delay:.4s}
        @keyframes typingBounce {
            0%,80%,100%{transform:translateY(0);opacity:.5}
            40%{transform:translateY(-7px);opacity:1}
        }

        /* ── Quick replies ── */
        .quick-pill {
            cursor:pointer;padding:7px 14px;border-radius:999px;
            font-size:13px;font-weight:500;
            border:1px solid rgba(139,92,246,.35);
            color:#a78bfa;background:rgba(139,92,246,.08);
            transition:background .18s,border-color .18s,color .18s,transform .15s;
            white-space:nowrap;
        }
        .quick-pill:hover{background:rgba(139,92,246,.22);border-color:rgba(139,92,246,.65);color:#fff;transform:translateY(-1px)}
        .quick-pill:active{transform:scale(.96)}

        #chat-input { resize:none;min-height:44px;max-height:120px;overflow-y:auto; }
        #messages::-webkit-scrollbar{width:4px}
        #messages::-webkit-scrollbar-track{background:transparent}
        #messages::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:99px}

        #send-btn{transition:opacity .18s,transform .18s}
        #send-btn:hover:not(:disabled){opacity:.85;transform:scale(1.06)}
        #send-btn:disabled{opacity:.35;cursor:default}

        .bubble-bot strong,.bubble-user strong,.bubble-edit strong{font-weight:700}
        .bubble-bot em,.bubble-user em{font-style:italic;color:#a5b4fc}
    </style>
</head>

<body class="h-full font-sans text-slate-200 antialiased flex flex-col">

<!-- NAV -->
<header class="w-full max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pt-5 flex-shrink-0">
    <div class="glass rounded-2xl px-6 py-3.5 flex items-center justify-between shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-violet-500 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-violet-500/25">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
            </div>
            <div>
                <div class="text-base font-bold font-outfit bg-gradient-to-r from-violet-400 to-fuchsia-300 bg-clip-text text-transparent">JAThong AI</div>
                <div class="text-xs text-slate-400 font-medium">Portfolio Builder &bull; Powered by Gemini</div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="/evaluate" class="text-sm font-medium text-slate-400 hover:text-violet-400 transition-colors">CV Evaluator</a>
            <span class="h-4 w-px bg-slate-800 hidden sm:inline"></span>
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-violet-500/10 text-violet-400 border border-violet-500/20">
                <span class="w-1.5 h-1.5 rounded-full bg-violet-400 animate-pulse"></span>AI Active
            </span>
        </div>
    </div>
</header>

<!-- MAIN -->
<main class="w-full max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex gap-5 flex-grow min-h-0 overflow-hidden" style="height: calc(100vh - 90px);">

    <!-- Chat Panel -->
    <section class="flex flex-col flex-1 min-w-0 glass rounded-2xl overflow-hidden shadow-2xl relative">
        <!-- Messages Area -->
        <div id="messages" class="flex-1 overflow-y-auto px-5 py-6 flex flex-col gap-3 scroll-smooth" aria-live="polite"></div>

        <!-- Quick Replies -->
        <div id="quick-replies" class="px-5 pb-3 flex flex-wrap gap-2"></div>

        <!-- Input Footer -->
        <form id="chat-form" class="px-4 pb-4 pt-2 border-t border-white/[0.06] bg-[rgba(9,13,22,0.55)] flex gap-3 items-end">
            <textarea
                id="chat-input"
                rows="1"
                placeholder="Nhập câu trả lời của bạn..."
                class="flex-1 bg-slate-800/70 border border-violet-500/20 focus:border-violet-500/60 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-500 outline-none transition-colors font-sans"
                aria-label="Nhập tin nhắn"
            ></textarea>
            <button type="submit" id="send-btn" aria-label="Gửi" class="w-10 h-10 flex-shrink-0 rounded-xl bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-violet-500/30">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                </svg>
            </button>
        </form>
    </section>
</main>

<script>
(function () {
    'use strict';

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const messagesEl    = document.getElementById('messages');
    const inputEl       = document.getElementById('chat-input');
    const sendBtn       = document.getElementById('send-btn');
    const chatForm      = document.getElementById('chat-form');
    const quickEl       = document.getElementById('quick-replies');

    const LS_KEY = 'portfolio_session_id';

    let sessionId = null;
    let isSending = false;
    let currentState = 'question_1';

    // ── Active Chat History ──
    let chatHistory = []; 

    // ── Markdown-lite ─────────────────────────────────────────────────────────
    function renderMd(text) {
        return text
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g,     '<em>$1</em>')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="text-skyAccent hover:underline font-semibold" target="_self">$1</a>')
            .replace(/\n/g, '<br>');
    }

    // ── Render whole history from state ──
    function renderHistory() {
        messagesEl.innerHTML = '';
        chatHistory.forEach(msg => {
            const div = document.createElement('div');
            if (msg.role === 'user')        div.className = 'bubble-user';
            else                            div.className = 'bubble-bot';
            div.innerHTML = renderMd(msg.text);
            messagesEl.appendChild(div);
        });
        scrollDown();
    }

    function addMessageToHistory(role, text, state) {
        chatHistory.push({ role, text, state });
        renderHistory();
    }

    // ── Typing indicator ──
    function showTyping() {
        const wrap = document.createElement('div');
        wrap.id = 'typing';
        wrap.className = 'bubble-bot flex items-center gap-1.5 py-3 px-4';
        wrap.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        messagesEl.appendChild(wrap);
        scrollDown();
        return wrap;
    }

    function scrollDown() {
        requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
    }

    // ── Apply API response ────────────────────────────────────────────────────
    function applyResponse(resp) {
        document.getElementById('typing')?.remove();
        addMessageToHistory('bot', resp.reply, resp.state);
        renderQuickReplies(resp.quick_replies);
        currentState = resp.state;

        const isQuestion2 = resp.state === 'question_2';
        const isDone = resp.state === 'done';
        
        inputEl.disabled = isDone || isQuestion2;
        sendBtn.disabled = isDone || isQuestion2;

        if (isQuestion2) {
            inputEl.placeholder = 'Chọn nút "Yêu cầu hỗ trợ 🛠️" để tiếp tục...';
        } else if (isDone) {
            inputEl.placeholder = 'Hội thoại đã kết thúc.';
        } else {
            inputEl.placeholder = 'Nhập câu trả lời của bạn...';
            inputEl.focus();
        }
        
        isSending = false;
    }

    // ── Quick replies ─────────────────────────────────────────────────────────
    function renderQuickReplies(replies) {
        quickEl.innerHTML = '';
        (replies || []).forEach(r => {
            const pill = document.createElement('button');
            pill.type = 'button';
            pill.className = 'quick-pill';
            pill.textContent = r;
            pill.addEventListener('click', () => sendMessage(r));
            quickEl.appendChild(pill);
        });
    }

    // ── Send message ─────────────────────────────────────────────────────────
    async function sendMessage(text) {
        text = (text || inputEl.value).trim();
        if (!text || isSending || !sessionId) return;

        if (text === "🔄 Tạo Portfolio mới") {
            startFresh(true);
            return;
        }

        isSending = true;
        sendBtn.disabled = true;
        inputEl.disabled = true;
        inputEl.value = '';
        inputEl.style.height = 'auto';
        quickEl.innerHTML = '';

        addMessageToHistory('user', text, currentState);
        showTyping();

        // 15-second client-side timeout logic
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);

        try {
            const res = await fetch('/api/v1/portfolio/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, message: text }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || `HTTP ${res.status}`);
            const data = await res.json();
            applyResponse(data);
        } catch (err) {
            clearTimeout(timeoutId);
            document.getElementById('typing')?.remove();
            
            const isTimeout = err.name === 'AbortError';
            const errorMsg = isTimeout 
                ? '⚠️ Yêu cầu bị quá hạn (Timeout). Hệ thống đang bận phản hồi, vui lòng gửi lại câu trả lời hoặc thử lại sau.' 
                : `⚠️ Lỗi: ${err.message}`;
            
            addMessageToHistory('bot', errorMsg, currentState);
            isSending = false;
            sendBtn.disabled = false;
            inputEl.disabled = false;
        }
    }

    // ── Init session — always start fresh on page load ────────────────────────
    async function boot() {
        sendBtn.disabled = true;
        inputEl.disabled = true;
        // Always start a new session every page load.
        // The 3-question flow is short enough that resuming is not needed,
        // and resuming into question_2 would lock the input confusingly.
        localStorage.removeItem(LS_KEY);
        await startFresh(false);
    }

    window.startFresh = async function (confirmRequired = false) {
        if (confirmRequired) {
            const accept = confirm("Bạn có chắc chắn muốn bắt đầu lại không? Toàn bộ dữ liệu chưa lưu sẽ bị mất.");
            if (!accept) return;
        }

        messagesEl.innerHTML = '';
        chatHistory = [];
        sessionId = null;
        showTyping();
        try {
            const res = await fetch('/api/v1/portfolio/session', { method: 'POST' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            sessionId = data.session_id;
            localStorage.setItem(LS_KEY, sessionId);
            applyResponse(data);
        } catch (err) {
            document.getElementById('typing')?.remove();
            addMessageToHistory('bot', `⚠️ Không thể kết nối máy chủ: ${err.message}`, 'question_1');
        }
    };

    // ── Events ────────────────────────────────────────────────────────────────
    chatForm.addEventListener('submit', e => {
        e.preventDefault();
        sendMessage();
    });

    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            sendMessage(); 
        }
    });

    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ── Boot ──────────────────────────────────────────────────────────────────
    boot();
})();
</script>
</body>
</html>
